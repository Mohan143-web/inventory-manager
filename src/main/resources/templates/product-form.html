<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: html(title='Product', content=~{::main})}">
<body>
<main>
    <h2 th:text="${product.id} == null ? 'New Product' : 'Edit Product'">Product</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="${product.id} == null ? @{/products} : @{|/products/${product.id}|}"
          th:object="${product}" method="post" class="mt-3">
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label">Name</label>
                <input type="text" th:field="*{name}" class="form-control" maxlength="150" required>
                <div class="text-danger small" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label">SKU</label>
                <input type="text" th:field="*{sku}" class="form-control" maxlength="60" required>
                <div class="text-danger small" th:if="${#fields.hasErrors('sku')}" th:errors="*{sku}"></div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-4 mb-3">
                <label class="form-label">Category</label>
                <select name="categoryId" class="form-select" required>
                    <option th:each="c : ${categories}"
                            th:value="${c.id}" th:text="${c.name}"
                            th:selected="${product.category != null and product.category.id == c.id}"></option>
                </select>
            </div>
            <div class="col-md-4 mb-3">
                <label class="form-label">Price</label>
                <input type="number" step="0.01" min="0" th:field="*{price}" class="form-control" required>
            </div>
            <div class="col-md-2 mb-3">
                <label class="form-label">Stock</label>
                <input type="number" min="0" th:field="*{stockLevel}" class="form-control" required>
            </div>
            <div class="col-md-2 mb-3">
                <label class="form-label">Low @</label>
                <input type="number" min="0" th:field="*{lowStockThreshold}" class="form-control" required>
            </div>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/products}" class="btn btn-link">Cancel</a>
    </form>
</main>
</body>
</html>
